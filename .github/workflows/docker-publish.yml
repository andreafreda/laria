name: Publish Docker image

# Build the LARIA image and push it to GitHub Container Registry on every push
# to main (and on demand). The NAS runs Watchtower, which pulls :latest and
# recreates the container automatically, so a merge to main updates production
# with no manual steps. Uses the built-in GITHUB_TOKEN, no extra secrets.

on:
  push:
    branches: [main]
    paths:
      - "core/**"
      - "ui/**"
      - "docker/**"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
